id: "strategy_div_lowvol_01"
name: "红利低波"
description: |
  【适合谁】保守型投资者，追求稳定现金流和低回撤。
  【怎么选】以股息率为核心，辅以低估值（PB低）和盈利质量（低应计），
  排除高波动和高估值股票。本质上选的是"能赚钱、愿意分钱、价格不贵"的公司。
  【风险】牛市跑输大盘——高股息股通常增长慢，牛市中不受追捧。
  【典型持仓】银行、公用事业、高速公路、煤炭等高分红国企。
active: true

universe:
  exclude_ST: true
  exclude_new_stock_days: 120
  min_listing_days: 250

factor_weights:
  DYield: 0.35
  PB: -0.20
  Accruals_Ratio: -0.15
  ROE_TTM: 0.10
  GrossMargin_TTM: 0.10
  RSI_14: -0.10

preprocessing:
  winsorize_pct: [1, 99]
  standardize_method: "zscore"

signals:
  buy_top_pct: 0.15
  sell_bottom_pct: 0.15
  max_holdings: 25
  rebalance: "weekly"
