# 策略模板 — 价值动量精选
# 复制此文件并修改为你自己的策略
id: "strategy_val_mom_01"
name: "价值动量精选"
description: "低估值 + 高质量 + 强动量的组合策略"
active: true

universe:
  exclude_ST: true
  exclude_new_stock_days: 60
  exclude_limit_trade: false
  exclude_suspended: true
  min_listing_days: 120

factor_weights:
  PE_TTM: -0.15         # 负权重: PE低=好
  PB: -0.05             # 负权重: PB低=好
  ROE_TTM: 0.20         # 正权重: ROE高=好
  Revenue_YoY: 0.10     # 正权重: 增长快=好
  MOM_6M: 0.15          # 正权重: 动量强=好
  Turnover_Change: 0.05  # 正权重: 换手率上升=情绪好
  RSI_14: -0.05         # 负权重: RSI低=超卖反弹机会
  GrossMargin_TTM: 0.10 # 正权重: 毛利率高=经营质量好
  DYield: 0.10          # 正权重: 股息率高=好
  Accruals_Ratio: -0.05 # 负权重: 应计低=盈利质量好

preprocessing:
  winsorize_pct: [1, 99]
  neutralization: []
  standardize_method: "zscore"

signals:
  buy_top_pct: 0.15
  sell_bottom_pct: 0.15
  max_holdings: 20
  min_holding_days: 1
  rebalance: "daily"
