id: "strategy_deep_value_01"
name: "深度价值"
description: |
  【适合谁】偏好低估值、有耐心的价值投资者。
  【怎么选】只看估值指标：PE低、PB低、PS低、股息率高，四项联合打分。
  不考虑盈利增速和股价动量，核心逻辑是"买得便宜才是硬道理"。
  【风险】低估值陷阱——有些股票便宜是因为基本面差，需要配合质量策略一起看。
  【典型持仓】银行、钢铁、煤炭等传统低估值行业。
active: true

universe:
  exclude_ST: true
  exclude_new_stock_days: 60
  min_listing_days: 120

factor_weights:
  PE_TTM: -0.30
  PB: -0.30
  PS_TTM: -0.20
  DYield: 0.20

preprocessing:
  winsorize_pct: [1, 99]
  standardize_method: "zscore"

signals:
  buy_top_pct: 0.15
  sell_bottom_pct: 0.15
  max_holdings: 20
  rebalance: "daily"
