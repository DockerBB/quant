id: "strategy_growth_mom_01"
name: "成长动量"
description: |
  【适合谁】追求高收益、能承受波动的成长型投资者。
  【怎么选】核心看三点：营收和净利润是否高速增长、股价是否处于上升趋势。
  不关心估值高低，只关心"是不是越来越好"。ROE作为辅助确认盈利质量。
  【风险】追高被套——高成长股一旦增速放缓，估值和股价会双杀。
  【典型持仓】新能源、半导体、医药等高景气赛道。
active: true

universe:
  exclude_ST: true
  exclude_new_stock_days: 60
  min_listing_days: 120

factor_weights:
  Revenue_YoY: 0.25
  NetProfit_YoY: 0.25
  MOM_6M: 0.20
  ROE_TTM: 0.15
  Turnover_Change: 0.10
  RSI_14: -0.05

preprocessing:
  winsorize_pct: [2, 98]
  standardize_method: "zscore"

signals:
  buy_top_pct: 0.12
  sell_bottom_pct: 0.12
  max_holdings: 15
  rebalance: "daily"
