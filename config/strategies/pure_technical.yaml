id: "strategy_technical_01"
name: "纯技术面"
description: |
  【适合谁】短线交易者，不看财报只看K线。
  【怎么选】纯粹基于量价数据——动量趋势、换手率变化、RSI超卖反弹。
  完全不依赖财务数据，数据更新最快（每日收盘后即可计算）。
  【风险】没有基本面支撑，遇到黑天鹅或系统性风险时回撤大。
  【典型持仓】热点题材、短期趋势股，换手率高。
active: true

universe:
  exclude_ST: true
  exclude_new_stock_days: 60
  min_listing_days: 120
  exclude_suspended: true

factor_weights:
  MOM_6M: 0.35
  Turnover_Change: 0.25
  RSI_14: -0.25
  PS_TTM: -0.15

preprocessing:
  winsorize_pct: [1, 99]
  standardize_method: "zscore"

signals:
  buy_top_pct: 0.10
  sell_bottom_pct: 0.10
  max_holdings: 10
  rebalance: "daily"
